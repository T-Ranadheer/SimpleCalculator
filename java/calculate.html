<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Simple Calculator</title>
</head>

<body>

    <h1>Simple Calculator</h1>

    <label for="firstno">First Number:</label>
    <input type="number" id="firstno" name="firstno">
    <br><br>

    <label for="secno">Second Number:</label>
    <input type="number" id="secno" name="secno">
    <br><br>

    <label for="operation">Operation:</label>
    <select id="operation" name="operation">
        <option value="add">Addition</option>
        <option value="sub">Subtraction</option>
        <option value="mul">Multiplication</option>
        <option value="div">Division</option>
    </select>
    <br><br>

    <button id="calculate">Calculate</button>
    <br><br>

    <label for="result">Result:</label>
    <input type="text" id="result" readonly>

    <script>
        document.getElementById("calculate").addEventListener("click", function () {

            let first = parseFloat(document.getElementById("firstno").value) || 0;
            let second = parseFloat(document.getElementById("secno").value) || 0;
            let operation = document.getElementById("operation").value;
            let result;

            switch (operation) {

                case "add":
                    result = first + second;
                    break;

                case "sub":
                    result = first - second;
                    break;

                case "mul":
                    result = first * second;
                    break;

                case "div":
                    if (second === 0) {
                        result = "Cannot divide by zero";
                    } else {
                        result = first / second;
                    }
                    break;

                default:
                    result = "";
            }

            document.getElementById("result").value = result;

        });
    </script>

</body>

</html>
